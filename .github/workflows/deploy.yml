name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js
        env:
          MYSQL_HOST: ${{ secrets.MYSQL_HOST }}
          MYSQL_PORT: ${{ secrets.MYSQL_PORT }}
          MYSQL_USER: ${{ secrets.MYSQL_USER }}
          MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
          MYSQL_DATABASE: ${{ secrets.MYSQL_DATABASE }}
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
        run: |
          npm run build
          [ -d public ] && cp -r public .next/standalone/ || true
          cp -r .next/static .next/standalone/.next/static

      - name: Write SSH key
        env:
          SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$VPS_PORT" "$VPS_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Sync files to VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key -p ${VPS_PORT} -o StrictHostKeyChecking=no" \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='.next/cache' \
            --exclude='.env' \
            --exclude='.env.local' \
            --exclude='.env.production' \
            ./ "${VPS_USER}@${VPS_HOST}:/opt/creamee/"

      - name: Install deps & restart on VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          ssh -i ~/.ssh/deploy_key \
            -p "$VPS_PORT" \
            -o StrictHostKeyChecking=no \
            "${VPS_USER}@${VPS_HOST}" << 'ENDSSH'
          set -e
          cd /opt/creamee

          # Load .env để kiểm tra MySQL host
          if [ -f .env ]; then
            set -o allexport; source .env; set +o allexport
          fi
          echo "→ Kiểm tra MySQL (${MYSQL_HOST:-127.0.0.1}:${MYSQL_PORT:-3306})..."

          # Đợi MySQL sẵn sàng tối đa 30 giây
          for i in $(seq 1 6); do
            if mysqladmin -h "${MYSQL_HOST:-127.0.0.1}" -P "${MYSQL_PORT:-3306}" \
                -u "${MYSQL_USER}" --password="${MYSQL_PASSWORD}" ping --silent 2>/dev/null; then
              echo "  MySQL OK"
              break
            fi
            echo "  Thử lần $i/6 — đợi 5s..."
            sleep 5
            if [ "$i" -eq 6 ]; then
              echo "  Lỗi: không kết nối được MySQL sau 30s"
              # In trạng thái service để debug
              systemctl is-active mysql 2>/dev/null || systemctl is-active mysqld 2>/dev/null || echo "  (không tìm thấy mysql service)"
              exit 1
            fi
          done

          echo "→ Chạy DB migrations..."
          bash migrations/run.sh
          echo "→ Restart app..."
          pm2 delete creamee 2>/dev/null || true
          PORT=3001 pm2 start .next/standalone/server.js \
            --name "creamee" --cwd /opt/creamee
          pm2 save
          echo "✓ Deploy xong!"
          ENDSSH
